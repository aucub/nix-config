name: build

on:
  workflow_dispatch:
    inputs:
      sshx:
        description: "sshx"
        required: false
        default: false
        type: boolean
      cachix:
        description: "cachix"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            auto-optimise-store = true
            experimental-features = nix-command flakes cgroups git-hashing dynamic-derivations ca-derivations
            extra-substituters = https://cache.nixos.org https://nix-community.cachix.org https://cache.garnix.io https://qihaiumi.cachix.org https://cache.ngi0.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g= qihaiumi.cachix.org-1:Cf4Vm5/i3794SYj3RYlYxsGQZejcWOwC+X558LLdU6c= cache.ngi0.nixos.org-1:KqH5CBLNSyX184S9BKZJo1LxrxJ9ltnY2uAs5c/f1MA=

      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          diagnostic-endpoint: ""
          use-flakehub: false

      - uses: AdityaGarg8/remove-unwanted-software@master
        with:
          remove-android: true
          remove-dotnet: true
          remove-haskell: true
          remove-docker-images: true
          remove-codeql: true
          remove-large-packages: true
          remove-cached-tools: true
          remove-swapfile: true

      - if: ${{ inputs.cachix }}
        uses: cachix/cachix-action@v15
        with:
          name: qihaiumi
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: extractions/setup-just@v2

      - uses: actions/checkout@v4

      - if: ${{ inputs.sshx }}
        continue-on-error: true
        run: curl -sSf https://sshx.io/get | sh -s run
        env:
          NIXPKGS_ALLOW_UNFREE: 1
          NIX_BUILD_CORES: 3

      # nix build "github:NixOS/nixpkgs/nixos-unstable#nix" --impure --show-trace -L -v

      - if: ${{ !inputs.sshx }}
        continue-on-error: true
        run: |
          ulimit -v 9831110
          just build-os
        env:
          NIXPKGS_ALLOW_UNFREE: 1
          NIX_BUILD_CORES: 3
