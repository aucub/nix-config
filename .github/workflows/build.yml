name: build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1

      - name: "Create Dir for Mounting moar Disk Space"
        run: |
          sudo mkdir /nix

      - name: "Maximize Disk Space"
        uses: easimon/maximize-build-space@master
        with:
          build-mount-path: /nix
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: "true"

      - name: "Install Nix"
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable-small
          extra_nix_config: |
            auto-optimise-store = true
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v2

      - name: "Build NixOS config"
        run: |
          nix-env -f '<nixpkgs>' -iA nix-output-monitor
          nix build '.#nixosConfigurations.your-hostname.config.system.build.toplevel' --show-trace --log-format internal-json -v |& nom --json

      - name: "Print nixpkgs version"
        run: nix-instantiate --eval -E '(import <nixpkgs> {}).lib.version'
