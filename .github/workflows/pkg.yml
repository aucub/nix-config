name: pkg

on:
  workflow_dispatch:
    inputs:
      package:
        description: "package name"
        required: true
        default: ""
        type: string

jobs:
  pkg:
    runs-on: ubuntu-latest
    steps:
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            auto-optimise-store = true
            always-allow-substitutes = true
            builders-use-substitutes = true
            cores = 3
            max-jobs = 1
            min-free = 10240
            build-dir = /tmp
            sandbox = false
            warn-dirty = false
            use-registries = false
            use-cgroups = true
            experimental-features = nix-command flakes cgroups git-hashing dynamic-derivations ca-derivations
            substituters = https://cache.nixos.org https://nix-community.cachix.org https://cache.garnix.io https://qihaiumi.cachix.org https://cache.ngi0.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g= qihaiumi.cachix.org-1:Cf4Vm5/i3794SYj3RYlYxsGQZejcWOwC+X558LLdU6c= cache.ngi0.nixos.org-1:KqH5CBLNSyX184S9BKZJo1LxrxJ9ltnY2uAs5c/f1MA=
        env:
          TMPDIR: "/tmp"

      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          diagnostic-endpoint: ""
          use-flakehub: false

      - uses: AdityaGarg8/remove-unwanted-software@master
        with:
          remove-android: true
          remove-dotnet: true
          remove-haskell: true
          remove-docker-images: true
          remove-codeql: true
          remove-large-packages: true
          remove-cached-tools: true
          remove-swapfile: true

      - uses: cachix/cachix-action@v15
        with:
          name: qihaiumi
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: extractions/setup-just@v2

      - uses: actions/checkout@v4

      - run: |
          sudo sysctl vm.swappiness=10
          ulimit -v 8831110
          ionice -c 3 just build $PACKAGE
        continue-on-error: true
        env:
          PACKAGE: ${{ inputs.package }}
          NIXPKGS_ALLOW_UNFREE: 1
          TMPDIR: "/tmp"
