name: pkg

on:
  workflow_dispatch:
    inputs:
      package:
        description: "package name"
        required: true
        default: ""
        type: string

jobs:
  pkg:
    runs-on: ubuntu-latest
    steps:
      - uses: cachix/install-nix-action@v29
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            auto-optimise-store = true
            experimental-features = nix-command flakes
            extra-substituters = https://cache.nixos.org/ https://nix-community.cachix.org https://cache.garnix.io
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          diagnostic-endpoint: ""
          use-flakehub: false

      - uses: cachix/cachix-action@v15
        with:
          name: qihaiumi
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: easimon/maximize-build-space@master
        with:
          overprovision-lvm: true
          remove-android: true
          remove-dotnet: true
          remove-haskell: true
          remove-docker-images: true
          remove-codeql: true

      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v2

      - run: just build $PACKAGE
        env:
          PACKAGE: ${{ inputs.package }}
          NIXPKGS_ALLOW_UNFREE: 1
