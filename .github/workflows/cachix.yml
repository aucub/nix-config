name: Cachix
on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build and Cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.0

      - uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:master

      - uses: DeterminateSystems/magic-nix-cache-action@v2

      - uses: cachix/cachix-action@v12
        with:
          name: qihaiumi
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build and Cache
        run: |
          nix build  --experimental-features 'nix-command flakes'  -o clash-verge .#clash-verge
          cachix push qihaiumi clash-verge
          nix build  --experimental-features 'nix-command flakes'  -o clash-meta .#clash-meta
          cachix push qihaiumi clash-meta
