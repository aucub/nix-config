name: custom

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: cachix/install-nix-action@V28
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            auto-optimise-store = true
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          diagnostic-endpoint: ""
          use-flakehub: false

      - uses: AdityaGarg8/remove-unwanted-software@master
        with:
          remove-android: true
          remove-dotnet: true
          remove-haskell: true
          remove-docker-images: true
          remove-codeql: true
          remove-large-packages: true
          remove-cached-tools: true
          remove-swapfile: true

      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v2

      - uses: mdgreenwald/mozilla-sops-action@v1

      - run: |
          cd scripts/attic/
          sops -d server.toml.enc > server.toml
          sops -d config.toml.enc > config.toml
          mkdir ~/.config/attic/
          mv config.toml ~/.config/attic/config.toml
          mv server.toml ~/.config/attic/server.toml
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - run: |
          nix-channel --add https://nixos.org/channels/nixpkgs-unstable nixpkgs
          nix-channel --update

      - run: |
          nix-env -iA nixpkgs.attic-server
          systemd-run --user --unit=atticd atticd
          sleep 15
          systemctl status --user atticd.service

      - run: |
          nix-env -iA nixpkgs.attic-client
          attic use default
          systemd-run --user --unit=attic attic watch-store default
          sleep 15
          systemctl status --user attic.service

      - run: curl -sSf https://sshx.io/get | sh -s run
